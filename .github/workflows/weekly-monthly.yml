name: Weekly & Monthly Reports

on:
  schedule:
    # Weekly: Sunday 9:00 AM IST = Sunday 03:30 UTC
    - cron: '30 3 * * 0'
    # Monthly: 1st of month 9:00 AM IST = 1st 03:30 UTC
    - cron: '30 3 1 * *'
  workflow_dispatch:
    inputs:
      report_type:
        description: 'Report type to generate'
        required: true
        type: choice
        options:
          - weekly
          - monthly
          - taste-update

env:
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Run on Sundays (cron) or manual trigger with weekly
    if: github.event.schedule == '30 3 * * 0' || github.event.inputs.report_type == 'weekly'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate weekly report
        run: python -m src.main --mode weekly

      - name: Recalculate taste profile
        run: python -m src.main --mode taste-update

      - name: Commit updates
        run: |
          git config user.name "AI Intelligence Bot"
          git config user.email "bot@ai-intelligence.local"
          git add knowledge/ feedback.json || true
          git diff --cached --quiet || git commit -m "📊 Weekly report + taste update — $(date -u +%Y-%m-%d)"
          git push || true

  monthly-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Run on 1st of month or manual trigger with monthly
    if: github.event.schedule == '30 3 1 * *' || github.event.inputs.report_type == 'monthly'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate monthly report
        run: python -m src.main --mode monthly
